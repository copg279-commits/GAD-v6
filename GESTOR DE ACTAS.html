<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELECTOR DE ACTAS GAD - V9 INVERTIDO</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { 
            background-color: #0f172a; /* Fondo muy oscuro (Slate 900) */
            font-family: 'Segoe UI', Arial, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden; 
        }
        
        /* El selector principal sigue siendo claro para alto contraste */
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.2);
        }

        .btn-main { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 10px 20px -3px rgba(6, 182, 212, 0.5); }
        .btn-main:active { transform: translateY(-1px); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        .quick-icon {
            width: 140px; 
            height: 90px;
            background: linear-gradient(145deg, #ffffff 0%, #f7f9fb 100%);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 3px 8px -2px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            position: relative;
        }
        .quick-icon:hover {
            transform: translateY(-4px); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            border-color: #93c5fd;
            background: #f7faff;
        }
        
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(15, 23, 42, 0.8); /* Overlay más oscuro */
            backdrop-filter: blur(5px);
            z-index: 50; display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; } /* Scrollbar oscuro */
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body>
    <div id="root" class="h-full flex flex-col"></div>

    <script type="text/babel">
        // --- CONFIGURACIÓN FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyA6EDUJ2dG50DphB-dF6GLi3P2IlW8lDl4",
            authDomain: "gad-alicante-v3.firebaseapp.com",
            databaseURL: "https://gad-alicante-v3-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "gad-alicante-v3",
            storageBucket: "gad-alicante-v3.firebasestorage.app",
            messagingSenderId: "906986258369",
            appId: "1:906986258369:web:21a7ea29a33b5f395e3940"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        const DB_TEMPLATES_PATH = 'actas'; 
        const DB_LOGO_PATH = 'selector_gad/logo';

        // --- ICONOS SVG ---
        const icons = {
            doc: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />,
            camera: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />,
            alert: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />,
            user: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />,
            warning: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />,
            passport: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />,
            money: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />,
            clock: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        };

        const defaultTemplates = [
            { id: 1, name: "Acta Intervención de Documentos", file: "PLANTILLA Acta Intervención de Documentos.html", usageCount: 0, keyword: "Intervención", icon: "doc" },
            { id: 2, name: "Acta petición de Cámaras Sala de Control", file: "PLANTILLA Acta petición de Cámaras Sala de Control.html", usageCount: 0, keyword: "Cámaras", icon: "camera" },
            { id: 3, name: "Denuncia notificada fuera de plazo 20 días", file: "PLANTILLA Denuncia notificada fuera de plazo 20 días.html", usageCount: 0, keyword: "JPT Plazo", icon: "clock" },
            { id: 4, name: "Solicitud Alerta Sala de Control", file: "PLANTILLA Solicitud Alerta Sala de Control.html", usageCount: 0, keyword: "Alerta Control", icon: "alert" },
            { id: 5, name: "Solicitud de datos empadronamiento", file: "PLANTILLA Solicitud de datos empadronamiento.html", usageCount: 0, keyword: "Padrón", icon: "user" },
            { id: 6, name: "Acta Infracción Aduanera", file: "PLANTILLA Acta Infracción Aduanera.html", usageCount: 0, keyword: "Aduana", icon: "money" },
            { id: 7, name: "Acta Citación TIV", file: "PLANTILLA Acta Citación TIV.html", usageCount: 0, keyword: "Citación TIV", icon: "passport" },
            { id: 8, name: "Acta Citación EXTRANJERÍA", file: "PLANTILLA Acta Citación EXTRANJERÍA.html", usageCount: 0, keyword: "Extranjería", icon: "warning" }
        ];

        // --- FUNCIONES DB ---
        const getTemplatesFromDb = async () => {
            const snapshot = await db.ref(DB_TEMPLATES_PATH).once('value');
            if (snapshot.exists()) return Object.values(snapshot.val());
            return null;
        };
        const setTemplatesInDb = (templatesArray) => db.ref(DB_TEMPLATES_PATH).set(templatesArray);
        const setLogoInDb = (logoUrl) => db.ref(DB_LOGO_PATH).set(logoUrl);
        const getLogoFromDb = async () => {
             const snapshot = await db.ref(DB_LOGO_PATH).once('value');
             return snapshot.exists() ? snapshot.val() : null;
        };

        const App = () => {
            const [templates, setTemplates] = React.useState([]);
            const [selectedId, setSelectedId] = React.useState("");
            const [isEditMode, setIsEditMode] = React.useState(false);
            const [logo, setLogo] = React.useState('logogad.png'); 
            const [isLoading, setIsLoading] = React.useState(true);

            const mostUsedTemplates = React.useMemo(() => {
                return [...templates].sort((a, b) => (b.usageCount || 0) - (a.usageCount || 0));
            }, [templates]);

            React.useEffect(() => {
                const loadData = async () => {
                    let loadedTemplates = await getTemplatesFromDb();
                    let loadedLogo = await getLogoFromDb();
                    if (loadedTemplates && loadedTemplates.length > 0) {
                        setTemplates(loadedTemplates);
                    } else {
                        setTemplates(defaultTemplates);
                        await setTemplatesInDb(defaultTemplates);
                    }
                    if (loadedLogo) setLogo(loadedLogo);
                    setIsLoading(false);
                };
                loadData();
            }, []);

            const saveChangesInDb = (newTemplates) => {
                setTemplates(newTemplates);
                setTemplatesInDb(newTemplates);
            };

            const updateUsageAndOpen = (id) => {
                if (!id) {
                    alert("⚠️ Por favor, selecciona primero un documento de la lista o pulsa un acceso rápido.");
                    return;
                }
                const newT = templates.map(t => {
                    if (t.id == id) return { ...t, usageCount: (t.usageCount || 0) + 1 };
                    return t;
                });
                saveChangesInDb(newT);
                const template = newT.find(t => t.id == id);
                if (template) window.open(template.file, '_blank');
            };

            // Edición
            const handleUpdateItem = (id, field, value) => {
                const newT = templates.map(t => t.id === id ? { ...t, [field]: value } : t);
                saveChangesInDb(newT);
            };
            const handleDeleteItem = (id) => {
                if(confirm("¿Eliminar?")) {
                    const newT = templates.filter(t => t.id !== id);
                    saveChangesInDb(newT);
                    if(selectedId == id) setSelectedId("");
                }
            };
            const handleAddItem = () => {
                const newT = [...templates, { id: Date.now(), name: "NUEVA ACTA (Editar)", keyword: "NUEVA", file: "archivo.html", usageCount: 0, icon: "doc" }];
                saveChangesInDb(newT);
            };
            const handleResetDefaults = () => { 
                if(confirm("¿Restaurar lista original?")) {
                    saveChangesInDb(defaultTemplates);
                }
            };
            const handleResetUsage = () => {
                if(confirm("¿Estás seguro de poner a CERO todos los contadores de uso?")) {
                    const newT = templates.map(t => ({ ...t, usageCount: 0 }));
                    saveChangesInDb(newT);
                }
            };
            const handleMoveItem = (index, direction) => {
                const newTemplates = [...templates];
                const newIndex = index + (direction === 'up' ? -1 : 1);
                if (newIndex >= 0 && newIndex < newTemplates.length) {
                    [newTemplates[index], newTemplates[newIndex]] = [newTemplates[newIndex], newTemplates[index]];
                    saveChangesInDb(newTemplates);
                }
            };
            const handleLogoUpload = (e) => {
                const f = e.target.files[0];
                if(f){
                    const r = new FileReader();
                    r.onload = (ev) => { setLogo(ev.target.result); setLogoInDb(ev.target.result); };
                    r.readAsDataURL(f);
                }
            };

            // --- COMPONENTE ICONOS ---
            const QuickAccessIcons = ({ items, onIconClick, className }) => (
                <div className={`grid grid-flow-col gap-4 justify-center ${className}`}>
                    {items.slice(0, 4).map(t => (
                        <div 
                            key={t.id} 
                            onClick={() => onIconClick(t.id)} 
                            className="quick-icon flex flex-col items-center justify-center text-center cursor-pointer group"
                            title={t.name}
                        >
                            <svg className="w-8 h-8 text-[#06b6d4] mb-2 group-hover:text-[#0f766e] transition-colors transform group-hover:scale-110 duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                {icons[t.icon] || icons['doc']}
                            </svg>
                            <span className="text-sm font-bold text-slate-700 leading-none px-2 line-clamp-2">{t.keyword}</span>
                            <span className="text-[10px] text-gray-400 mt-1 font-medium bg-slate-100 px-2 py-0.5 rounded-full group-hover:bg-[#a5f3fc] group-hover:text-slate-800 transition-colors">{t.usageCount || 0} usos</span>
                        </div>
                    ))}
                </div>
            );

            if (isLoading) return <div className="flex flex-col h-full items-center justify-center bg-slate-50"><div className="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-blue-500"></div></div>;

            const topRowItems = mostUsedTemplates.slice(0, 4); 
            const bottomRowItems = mostUsedTemplates.slice(4, 8); 

            return (
                <div className="flex flex-col h-full bg-[#f0f4f8]">
                    
                    {/* CABECERA (AZUL MANDATORIO) */}
                    <div className="bg-slate-900 text-white p-4 shadow-lg flex justify-between items-center shrink-0 z-10">
                        <div className="flex items-center gap-6">
                            <div className="relative group cursor-pointer w-20 h-20 flex items-center justify-center transition-transform hover:scale-105">
                                <img src={logo} alt="Logo" className="w-full h-full object-contain drop-shadow-lg" />
                                <input type="file" className="absolute inset-0 opacity-0 cursor-pointer" title="Cambiar Logo" onChange={handleLogoUpload}/>
                            </div>
                            <div className="flex flex-col">
                                <h1 className="text-2xl font-black tracking-widest text-white drop-shadow-md">SELECTOR DE ACTAS</h1>
                                <p className="text-xs text-slate-400 tracking-wide font-medium uppercase">Grupo de Análisis Documental - GAD</p>
                            </div>
                        </div>
                        <button onClick={() => setIsEditMode(true)} className="px-5 py-2.5 rounded-xl text-sm font-bold shadow-md transition-all flex items-center gap-2 bg-white/10 hover:bg-white/20 border border-white/20 text-white backdrop-blur-sm">
                            <span>⚙️</span> CONFIGURACIÓN
                        </button>
                    </div>

                    {/* CUERPO PRINCIPAL (INVERTIDO) */}
                    <div className="flex-1 flex flex-col items-center justify-center p-8 relative overflow-hidden bg-slate-900">
                        
                        {/* 4 ICONOS SUPERIORES */}
                        <div className="mb-8 w-full max-w-5xl animate-in" style={{animationDelay: '0.1s'}}>
                            <QuickAccessIcons items={topRowItems} onIconClick={updateUsageAndOpen} />
                        </div>
                        
                        {/* SELECTOR CENTRAL (BLANCO) */}
                        <div className="glass-panel p-10 rounded-3xl w-full max-w-xl text-center animate-in relative z-20 shadow-2xl">
                            <div className="mb-8">
                                <h2 className="text-2xl font-bold text-slate-800 mb-2 tracking-tight">Selección de Documento</h2>
                                <div className="h-1.5 w-16 bg-gradient-to-r from-cyan-500 to-teal-400 mx-auto rounded-full"></div>
                            </div>
                            <div className="space-y-6">
                                <div className="relative group">
                                    <select value={selectedId} onChange={(e) => setSelectedId(e.target.value)} className="w-full p-4 pl-5 text-lg bg-slate-50 border border-slate-200 rounded-xl focus:border-cyan-500 focus:ring-4 focus:ring-cyan-50 outline-none transition-all cursor-pointer appearance-none font-semibold text-slate-700 shadow-inner hover:bg-white">
                                        <option value="" disabled>⬇️ Despliegue para seleccionar acta...</option>
                                        {templates.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                    </select>
                                    <div className="absolute right-5 top-1/2 transform -translate-y-1/2 pointer-events-none text-slate-400">▼</div>
                                </div>
                                <button onClick={() => updateUsageAndOpen(selectedId)} className="btn-main w-full py-4 rounded-xl text-lg font-bold shadow-lg flex items-center justify-center gap-3 transition-all bg-gradient-to-r from-blue-600 to-indigo-600 text-white cursor-pointer disabled:opacity-50 disabled:shadow-none">
                                    <span>ABRIR DOCUMENTO SELECCIONADO</span>
                                </button>
                            </div>
                            <div className="mt-6 text-xs font-medium text-slate-400 uppercase tracking-wider">{templates.length} plantillas disponibles</div>
                        </div>

                        {/* 4 ICONOS INFERIORES */}
                        <div className="mt-8 w-full max-w-5xl animate-in" style={{animationDelay: '0.2s'}}>
                            <div className="mb-12"> 
                                <QuickAccessIcons items={bottomRowItems} onIconClick={updateUsageAndOpen} />
                            </div>
                        </div>
                    </div>

                    {/* PIE DE PÁGINA (OSCURO) */}
                    <footer className="mt-auto text-center py-6 bg-slate-900 border-t border-slate-700 z-10 relative">
                        <hr className="border-t-2 border-slate-700 w-32 mx-auto mb-4 rounded-full" />
                        <div className="space-y-1 text-white">
                            <p className="font-extrabold text-base tracking-[0.2em] uppercase text-slate-100">GRUPO DE ANÁLISIS DOCUMENTAL</p>
                            <p className="font-bold text-sm tracking-wide text-slate-300 uppercase">POLICÍA LOCAL DE ALICANTE</p>
                            <p className="text-xs text-slate-400 mt-2">&copy; GAD - Todos los derechos reservados</p>
                        </div>
                    </footer>

                    {/* MODAL EDICIÓN */}
                    {isEditMode && (
                        <div className="modal-overlay animate-in">
                            <div className="bg-white w-full max-w-5xl h-[85vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden">
                                <div className="bg-slate-50 p-5 border-b flex justify-between items-center">
                                    <h3 className="font-bold text-slate-800 text-lg flex items-center gap-2">🛠️ Gestión de Actas</h3>
                                    <div className="flex gap-3">
                                        <button onClick={handleResetUsage} className="text-sm bg-orange-500 text-white px-3 py-1.5 rounded-lg transition-colors border border-orange-200 shadow-sm hover:bg-orange-600 font-bold">
                                            Resetear Contadores
                                        </button>
                                        <button onClick={handleResetDefaults} className="text-xs text-red-600 font-bold hover:bg-red-50 px-3 py-1.5 rounded transition-colors border border-transparent hover:border-red-200">Restaurar Todo</button>
                                        <button onClick={() => setIsEditMode(false)} className="text-sm bg-slate-800 text-white px-5 py-1.5 rounded-lg font-bold hover:bg-slate-700 shadow-md transition-all">Cerrar</button>
                                    </div>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 space-y-3 bg-slate-50/30">
                                    {templates.map((t, index) => (
                                        <div key={t.id} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex gap-4 items-center hover:border-blue-400 transition-all group">
                                            <div className="flex flex-col items-center gap-1 w-8 shrink-0">
                                                <div className="font-black text-slate-300 text-lg">{index + 1}</div>
                                                <button onClick={() => handleMoveItem(index, 'up')} disabled={index === 0} className="text-slate-400 hover:text-blue-600 disabled:opacity-30">▲</button>
                                                <button onClick={() => handleMoveItem(index, 'down')} disabled={index === templates.length - 1} className="text-slate-400 hover:text-blue-600 disabled:opacity-30">▼</button>
                                            </div>
                                            <div className="flex-1 grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
                                                <div className="md:col-span-4"><label className="text-[9px] font-bold text-slate-400 uppercase">Nombre Lista</label><input type="text" value={t.name} onChange={(e) => handleUpdateItem(t.id, 'name', e.target.value)} className="w-full border-b border-slate-300 focus:border-blue-500 outline-none bg-transparent font-bold text-sm text-slate-700 py-1"/></div>
                                                <div className="md:col-span-2"><label className="text-[9px] font-bold text-slate-400 uppercase">Palabra Clave</label><input type="text" value={t.keyword} onChange={(e) => handleUpdateItem(t.id, 'keyword', e.target.value)} className="w-full border-b border-slate-300 focus:border-blue-500 outline-none bg-transparent font-bold text-sm text-amber-600 py-1"/></div>
                                                <div className="md:col-span-2"><label className="text-[9px] font-bold text-slate-400 uppercase">Icono</label>
                                                    <select value={t.icon || 'doc'} onChange={(e) => handleUpdateItem(t.id, 'icon', e.target.value)} className="w-full border-b border-slate-300 focus:border-blue-500 outline-none bg-transparent text-xs py-1">
                                                        {Object.keys(icons).map(k => <option key={k} value={k}>{k.toUpperCase()}</option>)}
                                                    </select>
                                                </div>
                                                <div className="md:col-span-4"><label className="text-[9px] font-bold text-slate-400 uppercase">Archivo HTML</label><input type="text" value={t.file} onChange={(e) => handleUpdateItem(t.id, 'file', e.target.value)} className="w-full border-b border-slate-300 focus:border-blue-500 outline-none bg-transparent font-mono text-xs text-blue-600 py-1"/></div>
                                            </div>
                                            <div className="text-xs text-slate-400 w-16 text-right">Usos: {t.usageCount || 0}</div>
                                            <button onClick={() => handleDeleteItem(t.id)} className="w-8 h-8 flex items-center justify-center rounded-lg text-slate-300 hover:bg-red-50 hover:text-red-500 transition-all">✕</button>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-4 bg-white border-t border-slate-200 text-center">
                                    <button onClick={handleAddItem} className="bg-green-500 hover:bg-green-600 text-white px-6 py-2.5 rounded-xl font-bold shadow-lg flex items-center gap-2 mx-auto transition-transform active:scale-95 text-sm">
                                        <span>+</span> AÑADIR NUEVA ACTA
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
